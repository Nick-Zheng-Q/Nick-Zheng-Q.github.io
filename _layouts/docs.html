---
layout: default
---
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 docs-sidebar">
            <h4>{{ page.category }}</h4>
            <ul class="nav flex-column">
                {% assign category_posts = site.posts | where: "category", page.category %}
                {% for post in category_posts %}
                <li class="nav-item">
                    <a class="nav-link {% if page.url == post.url %}active{% endif %}" 
                       href="{{ post.url }}">
                        {{ post.title }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
        
        <!-- Main content -->
        <div class="col-md-9 docs-content">
            {{ content }}
        </div>
    </div>
</div>
